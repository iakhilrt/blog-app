name: Deploy Blog App Backend

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH into EC2 and deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          command_timeout: 30m
          script: |
            cd ~/blog-app/backend
            git pull origin main
            docker build -t blog-app-backend .
            docker stop blog-app || true
            docker rm blog-app || true
            docker run -d \
              --name blog-app \
              --env-file ~/blog-app.env \
              -p 8081:8080 \
              --restart always \
              blog-app-backend